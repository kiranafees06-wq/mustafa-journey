<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Little Baby</title>
    <link rel="stylesheet" href="style.css">
    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Love+Light&family=Momo+Signature&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="upper">
            <h3>Mommy’s Little Angel👑</h3>
            <h1>Muhammad Mustafa</h1>
            <h3 id="font">Journey</h3>
            <p>A beautiful journey that began on a special day.</p>
            <div class="birth">
                <h5>💙Born on💙</h5>
                <p>2nd May 2026</p>
            </div>
            <div class="dates">
                <div class="box box1" >
                    <div class="up">
                        <p>📅</p>
                    </div>
                    <div class="down">
                        <p>Days</p>
                        <hr>
                        <p id="days"></p>
                        
                    </div>
                </div>
                <div class="box box2" >
                        <div class="up">
                        <p>🕒</p>
                    </div>
                    <div class="down">
                        <p>Hours</p>
                        <hr>
                        <p id="hour"></p>
                    </div>
                </div>
                <div class="box box3">
                        <div class="up">
                        <p>⏱️</p>
                    </div>
                    <div class="down">
                         <p>Minutes</p>
                         <hr>
                         <p id="minute"></p>
                    </div>
                </div>
                <div class="box box4" >
                        <div class="up">
                        <p>⏰</p>
                    </div>
                    <div class="down">
                        <p>Second</p>
                        <hr>
                        <p  id="second"></p>                  </div>
                </div>
            </div>
            <div class="footer">
                <p>💙Every moment with you is a treasure💙</p>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
